site_name: Post-AP Game Dev
site_description: Game Development with Godot and Python
site_author: Your Name Here
docs_dir: docs
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: blue
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs             # Unit tabs across the top
    - navigation.tabs.sticky      # Tabs stay visible on scroll
    # - navigation.sections         # Group headings in sidebar
    #- navigation.expand           # Auto-expand active section
    - navigation.indexes          # Section index pages
    - navigation.top              # Back-to-top button
    - toc.follow                  # TOC highlights as you scroll
    - content.code.copy           # Copy button on code blocks
    - content.tabs.link           # Sync tabbed code blocks

markdown_extensions:
  - admonition                    # !!! note / warning / tip boxes
  - pymdownx.details              # Collapsible admonitions
  - pymdownx.superfences          # Fenced code blocks + nesting
  - pymdownx.tabbed:
      alternate_style: true       # Tabbed code blocks (GDScript / Python)
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

